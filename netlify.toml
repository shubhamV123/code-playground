[build]
  command = "npm run build"
  publish = "dist"

# Security Headers for Main Application
# These headers protect the parent app, NOT the sandboxed iframe preview
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy - Controls what resources can be loaded
    # IMPORTANT: This applies to YOUR app, not user code (user code runs in sandboxed iframe)
    Content-Security-Policy = '''
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://esm.sh https://cdn.jsdelivr.net https://ga.jspm.io;
      style-src 'self' 'unsafe-inline' https://esm.sh https://cdn.jsdelivr.net;
      img-src 'self' data: https:;
      font-src 'self' data: https://fonts.gstatic.com;
      connect-src 'self' https://registry.npmjs.org https://esm.sh https://cdn.jsdelivr.net https://ga.jspm.io;
      frame-src 'self';
      frame-ancestors 'none';
      worker-src 'self' blob:;
      media-src 'self';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    '''

    # Prevent this site from being embedded in iframes (clickjacking protection)
    X-Frame-Options = "DENY"

    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"

    # Control referrer information sent to other sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable browser features that could be abused
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=(), midi=(), magnetometer=(), gyroscope=(), accelerometer=()"

    # XSS Protection (legacy but still useful for older browsers)
    X-XSS-Protection = "1; mode=block"

    # Expect-CT: Certificate Transparency
    Expect-CT = "max-age=86400, enforce"

    # Cache control for security-sensitive pages
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# More permissive caching for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA routing - redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
